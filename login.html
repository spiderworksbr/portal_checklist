<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpiderWorks Go - Acesso ao Portal</title>
    <style>
        :root { --accent: #007AFF; --text-dark: #1D1D1F; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        
        #bg-slideshow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; transition: background-image 1.5s ease-in-out; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 0; }

        .login-wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; box-sizing: border-box; }
        .login-box { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 30px; border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 100%; max-width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        
        .logo { font-size: 26px; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #6e6e73; margin-bottom: 30px; }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-size: 16px; box-sizing: border-box; background: rgba(255,255,255,0.7); }
        input:focus { outline: none; border-color: var(--accent); background: #fff; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        
        .forgot-pass { display: block; margin-top: 15px; font-size: 13px; color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 500; }

        .sw-footer { position: absolute; bottom: 20px; color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; text-align: center; width: 100%; }
        .sw-footer a { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bg-slideshow"></div>
    <div class="overlay"></div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo">SW Go</div>
            <div class="subtitle">Check-list da Frota</div>
            
            <form id="formLogin">
                <input type="text" id="email" placeholder="E-mail ou CPF" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="submit" class="btn" id="btnEntrar">Acessar</button>
            </form>
            
            <a class="forgot-pass" onclick="recuperarSenha()">Esqueci minha senha</a>
            <div id="mensagemAviso" style="margin-top: 15px; font-size: 13px; font-weight: bold; display: none;"></div>
        </div>

        <div class="sw-footer">
            Desenvolvido por <a href="https://www.spiderworks.com.br" target="_blank">Spider Works</a> &copy; 2026
        </div>
    </div>

    <script>
        // Slideshow de fundo
        const imagens = ['imagens/img1.jpg', 'imagens/img2.jpg', 'imagens/img3.jpg'];
        let idx = 0;
        const bg = document.getElementById('bg-slideshow');
        bg.style.backgroundImage = `url('${imagens[0]}')`;
        setInterval(() => { idx = (idx + 1) % imagens.length; bg.style.backgroundImage = `url('${imagens[idx]}')`; }, 5000);

        const POCKETBASE_URL = 'https://be8-be8-backend.i6qanl.easypanel.host'; 
        const msgAviso = document.getElementById('mensagemAviso');

        // Lógica de Login e Redirecionamento Inteligente
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            btn.innerText = "Conectando...";
            btn.disabled = true;
            msgAviso.style.display = "none";

            try {
                const res = await fetch(`${POCKETBASE_URL}/api/collections/users_checklist_portal/auth-with-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        identity: document.getElementById('email').value, 
                        password: document.getElementById('senha').value 
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('pb_token', data.token);
                    localStorage.setItem('usuario_logado', JSON.stringify(data.record));

                    const perfil = data.record.perfil ? data.record.perfil.toUpperCase() : '';

                    // Redirecionamento por Perfil
                    if (perfil === 'SSMA' || perfil === 'ADMIN') {
                        window.location.href = 'index.html'; 
                    } else {
                        window.location.href = 'index.html';
                    }
                } else { throw new Error(); }
            } catch (err) {
                msgAviso.innerText = "❌ Acesso negado. Verifique os dados.";
                msgAviso.style.color = "#FF3B30";
                msgAviso.style.display = "block";
                btn.innerText = "Acessar";
                btn.disabled = false;
            }
        });

        async function recuperarSenha() {
            const emailDigitado = prompt("Digite seu E-mail cadastrado:");
            if (!emailDigitado) return;
            try {
                const res = await fetch(`${POCKETBASE_URL}/api/collections/users_checklist_portal/request-password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailDigitado })
                });
                if (res.ok) {
                    alert("✅ Link de redefinição enviado para o seu e-mail!");
                } else { alert("❌ E-mail não encontrado."); }
            } catch(e) { alert("Erro ao conectar com o servidor."); }
        }
    </script>
</body>
</html>
